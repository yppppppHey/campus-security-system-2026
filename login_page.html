<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 校园安全防护系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-header h3 {
            margin: 0;
            font-weight: 600;
        }
        .login-header p {
            margin: 10px 0 0;
            opacity: 0.9;
        }
        .login-body {
            padding: 30px;
        }
        .form-floating {
            margin-bottom: 20px;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .test-accounts {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
        }
        .test-accounts h6 {
            color: #6c757d;
            margin-bottom: 10px;
        }
        .test-accounts .account {
            padding: 5px 0;
            border-bottom: 1px dashed #dee2e6;
        }
        .test-accounts .account:last-child {
            border-bottom: none;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fa fa-shield fa-3x mb-3"></i>
            <h3>校园安全防护系统</h3>
            <p>多源敏感数据一体化安全防护平台</p>
        </div>
        <div class="login-body">
            <form method="POST" action="/auth/login">
                <input type="hidden" name="csrf_token" value="ImYxYjk4OTNhZjEyYWEzMjMwZjdmNDk1ODNkM2M3ZGJmYmQ4ODE0NmQi.afXzNg.RRdmSsWJsFj7D6OKtRk041ThbxA">

                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="用户名" required autofocus>
                    <label for="username"><i class="fa fa-user"></i> 用户名</label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="密码" required>
                    <label for="password"><i class="fa fa-lock"></i> 密码</label>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">记住我</label>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100">
                    <i class="fa fa-sign-in"></i> 登 录
                </button>
            </form>

            <!-- 测试账号信息 -->
            <div class="test-accounts">
                <h6><i class="fa fa-info-circle"></i> 测试账号</h6>
                <div class="account">
                    <strong>管理员:</strong> admin / Admin@123
                </div>
                <div class="account">
                    <strong>安全员:</strong> security / Security@123
                </div>
                <div class="account">
                    <strong>审计员:</strong> auditor / Auditor@123
                </div>
                <div class="account">
                    <strong>普通用户:</strong> user / User@123
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <small>校园多源敏感数据一体化安全防护系统 v1.0.0</small><br>
        <small>© 2024 挑战杯参赛团队 | 挑战杯网络安全赛道</small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
