{% extends "base.html" %}

{% block title %}角色管理 - 校园安全防护系统{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0"><i class="fa fa-users"></i> 角色管理</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>角色名称</th>
                                    <th>角色代码</th>
                                    <th>描述</th>
                                    <th>用户数</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for role in roles %}
                                <tr>
                                    <td>{{ role.name }}</td>
                                    <td><code>{{ role.code }}</code></td>
                                    <td>{{ role.description or '-' }}</td>
                                    <td>{{ role.user_count or 0 }}</td>
                                    <td>{{ role.created_at }}</td>
                                    <td>
                                        <a href="{{ url_for('admin.role_detail', role_id=role.id) }}" class="btn btn-sm btn-info">
                                            <i class="fa fa-eye"></i> 查看
                                        </a>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
