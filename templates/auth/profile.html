{% extends "base.html" %}

{% block title %}个人信息 - 校园安全防护系统{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0"><i class="fa fa-user"></i> 个人信息</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" value="{{ current_user.username }}" readonly>
                        </div>

                        <div class="mb-3">
                            <label for="real_name" class="form-label">真实姓名</label>
                            <input type="text" class="form-control" id="real_name" name="real_name"
                                   value="{{ current_user.real_name or '' }}">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ current_user.email or '' }}">
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">电话</label>
                            <input type="tel" class="form-control" id="phone" name="phone"
                                   value="{{ current_user.phone or '' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">角色</label>
                            <input type="text" class="form-control"
                                   value="{{ current_user.get_role().name if current_user.get_role() else '无' }}" readonly>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fa fa-save"></i> 保存
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0"><i class="fa fa-history"></i> 最近登录记录</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>IP地址</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for log in login_logs %}
                                <tr>
                                    <td>{{ log.login_time }}</td>
                                    <td>{{ log.ip_address }}</td>
                                    <td>
                                        {% if log.success %}
                                        <span class="badge bg-success">成功</span>
                                        {% else %}
                                        <span class="badge bg-danger">失败</span>
                                        {% endif %}
                                    </td>
                                </tr>
                                {% else %}
                                <tr>
                                    <td colspan="3" class="text-center text-muted">暂无记录</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
